<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fastbuild</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <main>
    <h1>fastbuild</h1>

    <section>
      <button hx-get="/api/hello" hx-target="#hello-out" hx-swap="innerHTML">
        Say hello
      </button>
      <div id="hello-out"></div>
    </section>

    <section>
      <button hx-post="/api/visit" hx-target="#visit-out" hx-swap="innerHTML">
        Record a visit
      </button>
      <div id="visit-out"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3yctGBdvh3aAX0FuFmzMYQv76hCitjao",
      authDomain: "fast-bld.firebaseapp.com",
      projectId: "fast-bld",
      storageBucket: "fast-bld.firebasestorage.app",
      messagingSenderId: "951730551323",
      appId: "1:951730551323:web:ef89c6775f643eae6796be",
      measurementId: "G-1B8B5KVXDK"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
  </script>
</body>
</html>
